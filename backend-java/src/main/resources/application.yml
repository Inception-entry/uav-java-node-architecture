server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: uav-backend-java
  profiles:
    default: local
  flyway:
    baseline-on-migrate: true
    baseline-version: 1
  mvc:
    async:
      request-timeout: 300000
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:admin123}
  temporal:
    connection:
      target: ${TEMPORAL_TARGET_ENDPOINT:localhost:7233}
    namespace: ${TEMPORAL_NAMESPACE:default}
    workers:
      - task-queue: ${TEMPORAL_TASK_QUEUE:uav-inspection-task-queue}
        workflow-classes:
          - com.uav.backend.temporal.workflow.InspectionWorkflowImpl
          - com.uav.backend.temporal.workflow.InspectionAnalysisWorkflowImpl
          - com.uav.backend.temporal.workflow.InspectionChatWorkflowImpl
        activity-beans:
          - inspectionTaskActivities
          - inspectionAnalysisActivities
app:
  ai:
    base-url: ${AI_BASE_URL:http://localhost:8000}
    connect-timeout: ${AI_CONNECT_TIMEOUT:3s}
    read-timeout: ${AI_READ_TIMEOUT:250s}
    max-attempts: ${AI_MAX_ATTEMPTS:2}
    initial-backoff: ${AI_INITIAL_BACKOFF:500ms}
    max-backoff: ${AI_MAX_BACKOFF:2s}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9011}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin123}
