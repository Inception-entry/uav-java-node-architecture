name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-java:
    name: Java backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend-java
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Test and package
        run: mvn --batch-mode --no-transfer-progress verify

  gateway-java:
    name: Spring Cloud Gateway
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: gateway-java
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Test and package
        run: mvn --batch-mode --no-transfer-progress verify

  backend-node:
    name: Node BFF
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend-node
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend-node/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build and test JWT authorization
        run: npm test

  frontend:
    name: Vue frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type-check and build
        run: npm run build
