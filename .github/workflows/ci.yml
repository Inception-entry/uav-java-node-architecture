name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-java:
    name: Java backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend-java
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Test and package
        run: mvn --batch-mode --no-transfer-progress verify

  gateway-java:
    name: Spring Cloud Gateway
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: gateway-java
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Test and package
        run: mvn --batch-mode --no-transfer-progress verify

  backend-node:
    name: Node BFF
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend-node
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend-node/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build and test JWT authorization
        run: npm test

  frontend:
    name: Vue frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type-check and build
        run: npm run build

  docker-e2e:
    name: Docker full-stack integration
    needs:
      - backend-java
      - gateway-java
      - backend-node
      - frontend
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare isolated CI environment
        shell: bash
        run: |
          set -euo pipefail
          ci_env="${RUNNER_TEMP}/uav-ci.env"
          cp deploy/.env.example "$ci_env"

          replace_env() {
            local key="$1"
            local value="$2"
            sed -i "s|^${key}=.*|${key}=${value}|" "$ci_env"
          }

          mysql_root_password="ci-root-$(openssl rand -hex 16)"
          mysql_password="ci-mysql-$(openssl rand -hex 16)"
          rabbitmq_password="ci-rabbit-$(openssl rand -hex 16)"
          minio_password="ci-minio-$(openssl rand -hex 16)"
          keycloak_admin_password="ci-admin-$(openssl rand -hex 16)"
          service_secret="$(openssl rand -hex 32)"
          test_user_password="ci-user-$(openssl rand -hex 16)"

          replace_env MYSQL_ROOT_PASSWORD "$mysql_root_password"
          replace_env MYSQL_PASSWORD "$mysql_password"
          replace_env RABBITMQ_DEFAULT_PASS "$rabbitmq_password"
          replace_env MINIO_ROOT_PASSWORD "$minio_password"
          replace_env KEYCLOAK_ADMIN_PASSWORD "$keycloak_admin_password"
          replace_env KEYCLOAK_UAV_SERVICE_CLIENT_SECRET "$service_secret"
          replace_env KEYCLOAK_DEV_USER_PASSWORD "$test_user_password"

          echo "::add-mask::$mysql_root_password"
          echo "::add-mask::$mysql_password"
          echo "::add-mask::$rabbitmq_password"
          echo "::add-mask::$minio_password"
          echo "::add-mask::$keycloak_admin_password"
          echo "::add-mask::$service_secret"
          echo "::add-mask::$test_user_password"
          echo "UAV_ENV_FILE=$ci_env" >> "$GITHUB_ENV"
          echo "KEYCLOAK_CLIENT_SECRET=$service_secret" >> "$GITHUB_ENV"

      - name: Start Ollama health-check mock
        shell: bash
        run: |
          nohup python3 scripts/ci/ollama-mock.py \
            > "${RUNNER_TEMP}/ollama-mock.log" 2>&1 &
          echo "$!" > "${RUNNER_TEMP}/ollama-mock.pid"
          scripts/ci/wait-for-http.sh \
            http://127.0.0.1:11434/api/tags 30 "Ollama mock"

      - name: Validate Compose configuration
        run: |
          docker compose \
            --env-file "$UAV_ENV_FILE" \
            -f deploy/docker-compose.yml \
            config --quiet

      - name: Build application images
        run: |
          docker compose \
            --env-file "$UAV_ENV_FILE" \
            -f deploy/docker-compose.yml \
            build backend-ai backend-java backend-node gateway frontend

      - name: Start backend integration stack
        run: |
          docker compose \
            --env-file "$UAV_ENV_FILE" \
            -f deploy/docker-compose.yml \
            up -d --no-build gateway

      - name: Wait for application readiness
        shell: bash
        run: |
          scripts/ci/wait-for-http.sh \
            http://127.0.0.1:8180/realms/uav/.well-known/openid-configuration \
            240 Keycloak
          scripts/ci/wait-for-http.sh \
            http://127.0.0.1:8000/health 180 "AI service"
          scripts/ci/wait-for-http.sh \
            http://127.0.0.1:8081/health 240 "Java backend"
          scripts/ci/wait-for-http.sh \
            http://127.0.0.1:3000/api/health 120 "Node BFF"
          scripts/ci/wait-for-http.sh \
            http://127.0.0.1:8082/actuator/health 120 Gateway

      - name: Verify three-role authorization
        run: |
          ./scripts/uav.sh auth-users
          ./scripts/uav.sh auth-verify

      - name: Verify Temporal and MySQL full stack
        env:
          CI_TASK_CODE: CI-${{ github.run_id }}-${{ github.run_attempt }}
        run: scripts/ci/verify-stack.sh

      - name: Collect failure diagnostics
        if: failure()
        shell: bash
        run: |
          set +e
          log_dir="${RUNNER_TEMP}/uav-ci-logs"
          mkdir -p "$log_dir"
          docker compose \
            --env-file "$UAV_ENV_FILE" \
            -f deploy/docker-compose.yml \
            ps --all > "$log_dir/compose-ps.txt" 2>&1
          docker compose \
            --env-file "$UAV_ENV_FILE" \
            -f deploy/docker-compose.yml \
            logs --no-color --timestamps > "$log_dir/compose.log" 2>&1
          docker images > "$log_dir/docker-images.txt" 2>&1
          cp "${RUNNER_TEMP}/ollama-mock.log" \
            "$log_dir/ollama-mock.log" 2>/dev/null || true

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: docker-e2e-logs-${{ github.run_id }}
          path: ${{ runner.temp }}/uav-ci-logs
          if-no-files-found: warn
          retention-days: 7

      - name: Stop integration stack
        if: always()
        shell: bash
        run: |
          if [[ -n "${UAV_ENV_FILE:-}" && -f "$UAV_ENV_FILE" ]]; then
            docker compose \
              --env-file "$UAV_ENV_FILE" \
              -f deploy/docker-compose.yml \
              down --volumes --remove-orphans
          fi
          if [[ -f "${RUNNER_TEMP}/ollama-mock.pid" ]]; then
            kill "$(cat "${RUNNER_TEMP}/ollama-mock.pid")" \
              2>/dev/null || true
          fi
