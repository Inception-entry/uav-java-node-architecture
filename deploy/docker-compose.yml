services:
  mysql:
    image: mysql:8.4
    container_name: uav-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "127.0.0.1:3307:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend

  redis:
    image: redis:7.4-alpine
    container_name: uav-redis
    restart: always
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend

  qdrant:
    image: qdrant/qdrant:v1.18.3
    container_name: uav-qdrant
    restart: always
    ports:
      - "127.0.0.1:${QDRANT_HOST_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:4-management
    container_name: uav-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend

  minio:
    image: minio/minio:latest
    container_name: uav-minio
    restart: always
    command: server /data --console-address ":9002"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9011}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9012}:9002"
    volumes:
      - minio_data:/data
    networks:
      - backend

  temporal:
    image: temporalio/auto-setup:latest
    container_name: uav-temporal
    restart: always
    environment:
      DB: mysql8
      DB_PORT: 3306
      MYSQL_SEEDS: mysql
      MYSQL_USER: root
      MYSQL_PWD: ${MYSQL_ROOT_PASSWORD}
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    ports:
      - "127.0.0.1:7233:7233"
    volumes:
      - ./temporal/dynamicconfig:/etc/temporal/config/dynamicconfig
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend

  temporal-ui:
    image: temporalio/ui:latest
    container_name: uav-temporal-ui
    restart: always
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:${FRONTEND_PORT:-8888}
    ports:
      - "127.0.0.1:${TEMPORAL_UI_PORT:-8088}:8080"
    depends_on:
      - temporal
    networks:
      - backend

  backend-ai:
    build:
      context: ../backend-ai
    container_name: uav-backend-ai
    restart: always
    network_mode: host
    depends_on:
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    environment:
      AI_OLLAMA_BASE_URL: http://127.0.0.1:11434
      AI_OLLAMA_MODEL: ${AI_OLLAMA_MODEL:-my-drone-expert}
      AI_OLLAMA_EMBEDDING_MODEL: ${AI_OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      AI_OLLAMA_TIMEOUT_SECONDS: ${AI_OLLAMA_TIMEOUT_SECONDS:-120}
      AI_OLLAMA_MAX_ATTEMPTS: ${AI_OLLAMA_MAX_ATTEMPTS:-2}
      AI_OLLAMA_INITIAL_BACKOFF_SECONDS: ${AI_OLLAMA_INITIAL_BACKOFF_SECONDS:-0.5}
      AI_OLLAMA_MAX_BACKOFF_SECONDS: ${AI_OLLAMA_MAX_BACKOFF_SECONDS:-2}
      AI_DEPENDENCY_HEALTH_TIMEOUT_SECONDS: ${AI_DEPENDENCY_HEALTH_TIMEOUT_SECONDS:-5}
      AI_REDIS_URL: redis://127.0.0.1:${REDIS_HOST_PORT:-6380}/0
      AI_QDRANT_URL: http://127.0.0.1:${QDRANT_HOST_PORT:-6333}
      AI_QDRANT_COLLECTION: ${AI_QDRANT_COLLECTION:-uav_knowledge}
      AI_CHAT_HISTORY_TURNS: ${AI_CHAT_HISTORY_TURNS:-6}
      AI_CHAT_SESSION_TTL_SECONDS: ${AI_CHAT_SESSION_TTL_SECONDS:-86400}
      AI_KNOWLEDGE_CHUNK_SIZE: ${AI_KNOWLEDGE_CHUNK_SIZE:-800}
      AI_KNOWLEDGE_CHUNK_OVERLAP: ${AI_KNOWLEDGE_CHUNK_OVERLAP:-120}
      AI_KNOWLEDGE_TOP_K: ${AI_KNOWLEDGE_TOP_K:-4}
      AI_KNOWLEDGE_SCORE_THRESHOLD: ${AI_KNOWLEDGE_SCORE_THRESHOLD:-0.25}
      AI_KNOWLEDGE_MAX_FILE_SIZE_BYTES: ${AI_KNOWLEDGE_MAX_FILE_SIZE_BYTES:-10485760}
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://localhost:8000/health', timeout=5)
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend-java:
    build:
      context: ../backend-java
    container_name: uav-backend-java
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Shanghai
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USERNAME: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      TEMPORAL_TARGET_ENDPOINT: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: uav-inspection-task-queue
      APP_SECURITY_ENABLED: ${BACKEND_SECURITY_ENABLED:-true}
      AUTH_JWT_JWK_SET_URI: ${GATEWAY_JWT_JWK_SET_URI:-http://keycloak:8080/realms/uav/protocol/openid-connect/certs}
      AUTH_JWT_ISSUER_URI: ${GATEWAY_JWT_ISSUER_URI:-http://localhost:8180/realms/uav}
      AUTH_JWT_AUDIENCE: ${GATEWAY_JWT_AUDIENCE:-uav-web}
      AUTH_JWT_CLIENT_ID: ${GATEWAY_JWT_CLIENT_ID:-uav-web}
      AI_BASE_URL: http://host.docker.internal:8000
      AI_CONNECT_TIMEOUT: ${AI_CONNECT_TIMEOUT:-3s}
      AI_READ_TIMEOUT: ${AI_READ_TIMEOUT:-250s}
      AI_MAX_ATTEMPTS: ${AI_MAX_ATTEMPTS:-2}
      AI_INITIAL_BACKOFF: ${AI_INITIAL_BACKOFF:-500ms}
      AI_MAX_BACKOFF: ${AI_MAX_BACKOFF:-2s}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${JAVA_PORT}:8080"
    expose:
      - "8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      minio:
        condition: service_started
      temporal:
        condition: service_started
      backend-ai:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - backend

  backend-node:
    build:
      context: ../backend-node
    container_name: uav-backend-node
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      WS_PORT: 3001
      JAVA_BASE_URL: http://backend-java:8080
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_JWT_JWK_SET_URI: ${GATEWAY_JWT_JWK_SET_URI:-http://keycloak:8080/realms/uav/protocol/openid-connect/certs}
      AUTH_JWT_ISSUER_URI: ${GATEWAY_JWT_ISSUER_URI:-http://localhost:8180/realms/uav}
      AUTH_JWT_AUDIENCE: ${GATEWAY_JWT_AUDIENCE:-uav-web}
      WS_ALLOWED_ORIGIN: ${GATEWAY_ALLOWED_ORIGIN:-http://localhost:8888}
    ports:
      - "127.0.0.1:${NODE_PORT}:3000"
      - "127.0.0.1:${WS_PORT}:3001"
    expose:
      - "3000"
      - "3001"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      backend-java:
        condition: service_started
      keycloak:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - backend

  gateway:
    build:
      context: ../gateway-java
    container_name: uav-gateway
    restart: always
    environment:
      SERVER_PORT: 8080
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Shanghai
      NODE_BFF_URL: http://backend-node:3000
      NODE_WS_URL: ws://backend-node:3001
      NODE_WS_HTTP_URL: http://backend-node:3001
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GATEWAY_ALLOWED_ORIGIN: ${GATEWAY_ALLOWED_ORIGIN:-http://localhost:8888}
      GATEWAY_SECURITY_ENABLED: ${GATEWAY_SECURITY_ENABLED:-true}
      GATEWAY_JWT_JWK_SET_URI: ${GATEWAY_JWT_JWK_SET_URI:-http://keycloak:8080/realms/uav/protocol/openid-connect/certs}
      GATEWAY_JWT_ISSUER_URI: ${GATEWAY_JWT_ISSUER_URI:-http://localhost:8180/realms/uav}
      GATEWAY_JWT_AUDIENCE: ${GATEWAY_JWT_AUDIENCE:-uav-web}
      GATEWAY_JWT_CLIENT_ID: ${GATEWAY_JWT_CLIENT_ID:-uav-web}
      GATEWAY_RATE_LIMIT_REPLENISH_RATE: ${GATEWAY_RATE_LIMIT_REPLENISH_RATE:-20}
      GATEWAY_RATE_LIMIT_BURST_CAPACITY: ${GATEWAY_RATE_LIMIT_BURST_CAPACITY:-40}
      GATEWAY_AI_RATE_LIMIT_REPLENISH_RATE: ${GATEWAY_AI_RATE_LIMIT_REPLENISH_RATE:-1}
      GATEWAY_AI_RATE_LIMIT_BURST_CAPACITY: ${GATEWAY_AI_RATE_LIMIT_BURST_CAPACITY:-2}
      GATEWAY_KNOWLEDGE_RATE_LIMIT_REPLENISH_RATE: ${GATEWAY_KNOWLEDGE_RATE_LIMIT_REPLENISH_RATE:-5}
      GATEWAY_KNOWLEDGE_RATE_LIMIT_BURST_CAPACITY: ${GATEWAY_KNOWLEDGE_RATE_LIMIT_BURST_CAPACITY:-10}
      GATEWAY_WS_RATE_LIMIT_REPLENISH_RATE: ${GATEWAY_WS_RATE_LIMIT_REPLENISH_RATE:-5}
      GATEWAY_WS_RATE_LIMIT_BURST_CAPACITY: ${GATEWAY_WS_RATE_LIMIT_BURST_CAPACITY:-10}
      GATEWAY_TRUSTED_PROXY_COUNT: ${GATEWAY_TRUSTED_PROXY_COUNT:-1}
      GATEWAY_MAX_REQUEST_SIZE: ${GATEWAY_MAX_REQUEST_SIZE:-20MB}
    ports:
      - "127.0.0.1:${GATEWAY_PORT:-8082}:8080"
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      backend-node:
        condition: service_healthy
      keycloak:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - edge
      - backend

  keycloak:
    image: quay.io/keycloak/keycloak:26.7.0
    container_name: uav-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change-me-before-start}
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8180}
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      UAV_SERVICE_CLIENT_SECRET: ${KEYCLOAK_UAV_SERVICE_CLIENT_SECRET:-}
      UAV_DEV_USER_PASSWORD: ${KEYCLOAK_DEV_USER_PASSWORD:-}
    ports:
      - "127.0.0.1:${KEYCLOAK_PORT:-8180}:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/uav-realm.json:/opt/keycloak/data/import/uav-realm.json:ro
    networks:
      - edge
      - backend

  frontend:
    build:
      context: ../frontend
      args:
        VITE_KEYCLOAK_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8180}
        VITE_KEYCLOAK_REALM: uav
        VITE_KEYCLOAK_CLIENT_ID: uav-web
    container_name: uav-frontend
    restart: always
    environment:
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-localhost}
    ports:
      - "${FRONTEND_PORT:-8888}:80"
      - "${HTTPS_PORT:-8443}:443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      gateway:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - edge

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  keycloak_data:
  qdrant_data:

networks:
  edge:
    name: uav-edge
  backend:
    name: uav-backend
